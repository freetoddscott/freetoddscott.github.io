    <title>Free Todd Scott</title>

      name="description"
      content="Advocate for the release of Todd Scott, a man who has spent 35+ years incarcerated and demonstrated extensive rehabilitation. Join the movement to give Todd the opportunity to prove his growth and redemption."
    />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://freetoddscott.github.io/freetoddscott/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://freetoddscott.github.io/freetoddscott/og-image.jpg" />
    <!-- SPA redirect handler for GitHub Pages 404 fallback -->
    <script type="text/javascript">
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          )
        }
      })(window.location)
    </script>
